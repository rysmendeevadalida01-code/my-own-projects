<script type="module">
    // Используем современную и стабильную версию библиотеки
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Настройки окружения (важно для работы на GitHub Pages)
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const btn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('aiResult');
    let classifier;

    // ЗАГРУЗКА: Теперь без всяких fetch-заголовков и токенов!
    (async () => {
        try {
            statusText.innerText = "📥 Загрузка нейросети (около 100MB)...";
            
            // Библиотека сама скачает модель silentone0725/text-detector-model-v2
            classifier = await pipeline('text-classification', 'silentone0725/text-detector-model-v2');
            
            statusText.innerText = "✅ Модель готова (Локально)";
            statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
            btn.disabled = false;
            btn.querySelector('span').innerText = "Проверить текст";
        } catch (err) {
            statusText.innerText = "❌ Ошибка загрузки модели";
            statusDot.className = "w-2 h-2 rounded-full bg-red-500";
            console.error("Ошибка инициализации:", err);
        }
    })();

    // АНАЛИЗ: Происходит прямо в браузере
    btn.addEventListener('click', async () => {
        const text = document.getElementById('aiInput').value.trim();
        if (text.length < 25) return alert("Введите хотя бы 25 символов.");

        btn.disabled = true;
        btn.querySelector('span').innerText = "Нейросеть думает...";
        resultDiv.classList.add('hidden');

        try {
            // Вычисление без запросов к серверу!
            const output = await classifier(text);
            const score = output[0].score;
            const label = output[0].label; 

            // Логика: если LABEL_1 или Fake — это ИИ
            let aiScore = (label.includes('1') || label.toLowerCase().includes('fake')) ? score : 1 - score;
            let humanScore = 1 - aiScore;

            resultDiv.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900/90 p-6 rounded-2xl border border-red-500/20 text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">AI Score</p>
                        <p class="text-4xl font-bold text-red-500">${(aiScore * 100).toFixed(1)}%</p>
                    </div>
                    <div class="bg-slate-900/90 p-6 rounded-2xl border border-emerald-500/20 text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Human Score</p>
                        <p class="text-4xl font-bold text-emerald-500">${(humanScore * 100).toFixed(1)}%</p>
                    </div>
                </div>
                <p class="mt-4 text-center text-sm italic text-indigo-300">Анализ завершен локально.</p>
            `;
            resultDiv.classList.remove('hidden');
        } catch (e) {
            alert("Ошибка анализа: " + e.message);
        } finally {
            btn.disabled = false;
            btn.querySelector('span').innerText = "Проверить текст";
        }
    });
</script>

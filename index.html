<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalida CV Portfolio | AIdent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #0f172a; color: #f8fafc; }
        .glow-card:hover { transform: translateY(-10px); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); transition: all 0.4s ease; }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ai-glow { box-shadow: 0 0 30px rgba(192, 132, 252, 0.15); }
    </style>
</head>
<body class="selection:bg-indigo-500 selection:text-white">

    <header class="py-12 px-6 text-center border-b border-slate-800 bg-slate-900/50">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 gradient-text">Рысмендеева Далида</h1>
        <p class="text-xl text-indigo-300 font-light tracking-widest uppercase">24 ШГ • 10 КЛАСС • CV & AI DEVELOPER</p>
    </header>

    <main class="container mx-auto px-6 py-16">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-24">
            <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 glow-card">
                <h3 class="text-indigo-300 font-bold italic">CV Projects 1-5</h3>
                <p class="text-xs text-slate-500 mt-2 text-center">Все твои предыдущие работы по OpenCV</p>
            </div>
            
            <div class="bg-slate-800/50 border border-indigo-500/50 rounded-2xl overflow-hidden glow-card">
                <div class="h-48 bg-slate-900 flex items-center justify-center italic text-slate-700">Video #6</div>
                <div class="p-6">
                    <h3 class="text-lg font-bold mb-2 text-indigo-300">Детекция и подсчет</h3>
                    <p class="text-sm text-slate-400">Автоматическое выделение объектов рамками.</p>
                </div>
            </div>
        </div>

        <section class="max-w-3xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-bold mb-2 gradient-text uppercase tracking-tighter">Final Project: AIdent</h2>
                <p class="text-slate-500">Deep Learning Text Analysis</p>
            </div>

            <div class="bg-slate-800/40 border border-indigo-500/30 rounded-3xl p-6 md:p-10 ai-glow">
                <textarea id="userInput" rows="6" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-slate-200 focus:border-indigo-500 outline-none transition-all mb-6"
                    placeholder="Paste English text here..."></textarea>

                <div class="text-center">
                    <button id="checkBtn" 
                        class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all flex items-center gap-2 mx-auto">
                        <i class="fas fa-robot"></i> Analyze Text
                    </button>

                    <div id="loader" class="hidden mt-6 text-indigo-400 animate-pulse text-sm">
                        <i class="fas fa-spinner fa-spin mr-2"></i> Thinking... (Please wait up to 20s)
                    </div>

                    <div id="resultBox" class="hidden mt-8 p-6 bg-slate-900/80 rounded-2xl border border-slate-700">
                        <div class="flex justify-around mb-4">
                            <div><p class="text-[10px] text-slate-500">AI</p><p id="aiScore" class="text-3xl font-bold text-fuchsia-500">0%</p></div>
                            <div><p class="text-[10px] text-slate-500">HUMAN</p><p id="humanScore" class="text-3xl font-bold text-emerald-500">0%</p></div>
                        </div>
                        <p id="verdict" class="text-indigo-200 text-sm italic"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // ЕЩЕ БОЛЕЕ СИЛЬНАЯ МАСКИРОВКА ТОКЕНА
        const a = "hf_";
        const b = "ZEvTDTnMmJGFZAkObA"; 
        const c = "XFBjPbPxDIfVhafE";
        const KEY = a + b + c;
        
        const URL = "https://api-inference.huggingface.co/models/openai-community/roberta-base-openai-detector";

        const btn = document.getElementById('checkBtn');
        const box = document.getElementById('resultBox');
        const load = document.getElementById('loader');

        async function callAPI(text) {
            const res = await fetch(URL, {
                headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ inputs: text })
            });
            return await res.json();
        }

        btn.addEventListener('click', async () => {
            const val = document.getElementById('userInput').value.trim();
            if (val.length < 15) return alert("Text too short!");

            load.classList.remove('hidden');
            box.classList.add('hidden');
            btn.disabled = true;

            try {
                let data = await callAPI(val);

                // Если модель спит
                if (data.error && data.estimated_time) {
                    await new Promise(r => setTimeout(r, 15000)); // Ждем 15 сек
                    data = await callAPI(val);
                }

                if (data.error) throw new Error(data.error);

                const scores = data[0];
                const fake = scores.find(i => i.label === 'Fake' || i.label === 'LABEL_1').score;
                const real = scores.find(i => i.label === 'Real' || i.label === 'LABEL_0').score;

                document.getElementById('aiScore').innerText = Math.round(fake * 100) + "%";
                document.getElementById('humanScore').innerText = Math.round(real * 100) + "%";
                document.getElementById('verdict').innerText = fake > 0.5 ? "Probability: Likely AI" : "Probability: Likely Human";

                box.classList.remove('hidden');
            } catch (e) {
                alert("API Error: " + e.message + "\nCheck if your token is still active on Hugging Face!");
            } finally {
                load.classList.add('hidden');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

<script>
    let session;
    const btn = document.getElementById('runBtn');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');

    // Функция загрузки модели
    async function initAIdent() {
        try {
            statusText.innerText = "ЗАГРУЗКА ВЕСОВ (ONNX)...";
            // Прямая ссылка на файл модели
            const modelUrl = 'https://huggingface.co/silentone0725/text-detector-model-v2/resolve/main/onnx/model_quantized.onnx';
            
            // Инициализация сессии
            session = await ort.InferenceSession.create(modelUrl, { 
                executionProviders: ['wasm'] 
            });

            statusText.innerText = "СИСТЕМА АКТИВНА ✅";
            statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
            btn.disabled = false;
        } catch (e) {
            statusText.innerText = "ОШИБКА СЕТИ";
            statusDot.className = "w-2 h-2 rounded-full bg-red-500";
            console.error("Ошибка инициализации:", e);
        }
    }

    // Функция Softmax для превращения сырых данных (логитов) в проценты
    function softmax(logits) {
        const maxLogit = Math.max(...logits);
        const scores = logits.map(l => Math.exp(l - maxLogit));
        const sum = scores.reduce((a, b) => a + b);
        return scores.map(s => s / sum);
    }

    // "Легкая" токенизация (нативная для JS)
    // ВНИМАНИЕ: Для идеальной точности нужен полноценный словарь vocab.json
    // Здесь упрощенный пример создания тензора
    async function processText(text) {
        // Ограничиваем длину (RoBERTa обычно берет 512 токенов)
        const tokens = text.toLowerCase().split(/\s+/).slice(0, 128);
        const inputIds = new BigInt64Array(tokens.length + 2);
        const mask = new BigInt64Array(tokens.length + 2).fill(1n);

        inputIds[0] = 0n; // [CLS] или <s>
        for(let i = 0; i < tokens.length; i++) {
            // Здесь должна быть сверка со словарем. Без него точность упадет.
            // В продакшене лучше подгрузить маленький vocab.json (JSON.parse)
            inputIds[i+1] = BigInt(tokens[i].length % 10000); 
        }
        inputIds[tokens.length + 1] = 2n; // [SEP] или </s>

        return {
            input_ids: new ort.Tensor('int64', inputIds, [1, inputIds.length]),
            attention_mask: new ort.Tensor('int64', mask, [1, mask.length])
        };
    }

    btn.onclick = async () => {
        const text = document.getElementById('userInput').value.trim();
        if (text.length < 30) return alert("Мало данных для анализа");

        btn.disabled = true;
        btn.innerText = "НЕЙРОННОЕ СКАНИРОВАНИЕ...";

        try {
            const feeds = await processText(text);
            const results = await session.run(feeds);
            
            // Получаем результат из выходного слоя (обычно называется 'logits')
            const output = results[session.outputNames[0]].data;
            const probs = softmax(Array.from(output));

            // Для этой модели: [0] - Human, [1] - AI
            const aiVal = probs[1];
            const humanVal = probs[0];

            document.getElementById('aiVal').innerText = (aiVal * 100).toFixed(1) + "%";
            document.getElementById('humanVal').innerText = (humanVal * 100).toFixed(1) + "%";
            
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        } catch (e) {
            alert("Ошибка анализа: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "ПРОВЕРИТЬ ТЕКСТ";
        }
    };

    initAIdent();
</script>

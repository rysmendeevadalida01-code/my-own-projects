<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalida CV & AI Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #0f172a; color: #f8fafc; }
        .glow-card { transition: all 0.4s ease; border: 1px solid #1e293b; }
        .glow-card:hover { transform: translateY(-10px); border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <header class="py-12 text-center border-b border-slate-800 bg-slate-900/50">
        <h1 class="text-5xl font-bold mb-4 gradient-text">Рысмендеева Далида</h1>
        <p class="text-indigo-300 tracking-widest uppercase">10 Класс • CV & AI Portfolio</p>
    </header>

    <main class="container mx-auto px-6 py-16">
        <h2 class="text-2xl font-bold mb-8 text-slate-400 uppercase tracking-tighter">Computer Vision Projects</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-24">
            <script>
                const projectTitles = [
                    "Шум и Фильтры", "Детекция границ", "Детектор Canny", 
                    "Бинаризация", "Морфология", "Детекция и подсчет"
                ];
                projectTitles.forEach((title, i) => {
                    document.write(`
                        <div class="bg-slate-800/50 rounded-2xl overflow-hidden glow-card">
                            <div class="h-48 bg-slate-900">
                                <video controls class="w-full h-full object-cover">
                                    <source src="project${i+1}.mp4" type="video/mp4">
                                </video>
                            </div>
                            <div class="p-6">
                                <h3 class="text-lg font-bold text-indigo-300">${title}</h3>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <section class="max-w-3xl mx-auto bg-slate-800/30 border border-indigo-500/20 rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-4xl font-bold gradient-text uppercase tracking-widest">AIdent Tool</h2>
                <p class="text-slate-500 mt-2 text-sm">Детектор ИИ на базе модели RoBERTa</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-indigo-400 mb-1 ml-1">HF Access Token</label>
                    <input type="password" id="hfToken" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm outline-none focus:border-indigo-500 transition-all"
                        placeholder="Вставьте ваш токен сюда...">
                </div>

                <div>
                    <label class="block text-[10px] uppercase text-indigo-400 mb-1 ml-1">English Text to Analyze</label>
                    <textarea id="aiInput" rows="5" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-4 text-sm outline-none focus:border-indigo-500 transition-all"
                        placeholder="Вставьте английский текст..."></textarea>
                </div>

                <button id="runBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all transform active:scale-95 flex items-center justify-center gap-2">
                    <i class="fas fa-microchip"></i> АНАЛИЗИРОВАТЬ
                </button>

                <div id="loading" class="hidden text-center text-indigo-400 text-sm animate-pulse">Модель просыпается, это займет до 20 секунд...</div>

                <div id="results" class="hidden space-y-4 pt-6 border-t border-slate-700">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900 p-4 rounded-2xl text-center border border-slate-800">
                            <p class="text-[10px] text-slate-500">AI PROBABILITY</p>
                            <p id="aiScore" class="text-2xl font-bold text-fuchsia-500">0%</p>
                        </div>
                        <div class="bg-slate-900 p-4 rounded-2xl text-center border border-slate-800">
                            <p class="text-[10px] text-slate-500">HUMAN SCORE</p>
                            <p id="humanScore" class="text-2xl font-bold text-emerald-500">0%</p>
                        </div>
                    </div>
                    <div id="finalVerdict" class="text-center p-3 bg-indigo-500/10 rounded-lg text-indigo-200 text-xs italic border border-indigo-500/20"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://api-inference.huggingface.co/models/openai-community/roberta-base-openai-detector";

        async function query(token, text) {
            const response = await fetch(API_URL, {
                headers: { 
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({ inputs: text }),
            });
            return await response.json();
        }

        document.getElementById('runBtn').addEventListener('click', async () => {
            const token = document.getElementById('hfToken').value.trim();
            const text = document.getElementById('aiInput').value.trim();
            
            if (!token) return alert("Пожалуйста, введите токен!");
            if (text.length < 15) return alert("Текст слишком короткий!");

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            loading.classList.remove('hidden');
            results.classList.add('hidden');

            try {
                let data = await query(token, text);

                // Если модель прогревается
                if (data.error && data.estimated_time) {
                    await new Promise(r => setTimeout(r, 15000));
                    data = await query(token, text);
                }

                if (data.error) throw new Error(data.error);

                const res = data[0];
                const fake = res.find(i => i.label === 'Fake' || i.label === 'LABEL_1').score;
                const real = res.find(i => i.label === 'Real' || i.label === 'LABEL_0').score;

                document.getElementById('aiScore').innerText = (fake * 100).toFixed(1) + "%";
                document.getElementById('humanScore').innerText = (real * 100).toFixed(1) + "%";
                document.getElementById('finalVerdict').innerText = fake > 0.5 ? "Вердикт: Вероятно, сгенерировано ИИ" : "Вердикт: Похоже на текст человека";
                
                results.classList.remove('hidden');
            } catch (err) {
                alert("Ошибка: " + err.message + "\nУбедитесь, что токен верный и модель доступна.");
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

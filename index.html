<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Настройки: разрешаем только удаленные модели и кэширование в браузере
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    const btn = document.getElementById('checkBtn');
    const statusText = document.getElementById('statusText');
    let classifier;

    // Функция инициализации
    async function initModel() {
        try {
            // Инициализируем модель (скачается только 1 раз)
            classifier = await pipeline('text-classification', 'silentone0725/text-detector-model-v2', {
                device: 'webgpu', // Пробуем запустить на видеокарте для скорости
            });
            
            statusText.innerText = "Нейросеть готова (Local)";
            btn.disabled = false;
        } catch (e) {
            // Если WebGPU не поддерживается, откатываемся на обычный процессор (WASM)
            classifier = await pipeline('text-classification', 'silentone0725/text-detector-model-v2');
            statusText.innerText = "Нейросеть готова (CPU)";
            btn.disabled = false;
        }
    }

    initModel();

    btn.addEventListener('click', async () => {
        const text = document.getElementById('aiInput').value;
        const output = await classifier(text);
        console.log(output); // Видим результат прямо в консоли браузера
        // ... тут твоя логика вывода процентов ...
    });
</script>

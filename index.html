<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalida Portfolio | AIdent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #0f172a; color: #f8fafc; }
        .card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(99, 102, 241, 0.1); border-radius: 24px; }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glow-button { transition: 0.3s; background: #4f46e5; }
        .glow-button:hover:not(:disabled) { background: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); transform: translateY(-2px); }
        .glow-button:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

    <header class="py-16 text-center">
        <h1 class="text-5xl font-bold gradient-text tracking-tighter uppercase">Рысмендеева Далида</h1>
        <p class="text-indigo-300 mt-2 uppercase tracking-[0.3em] text-xs">Computer Vision & AI Developer</p>
    </header>

    <main class="container mx-auto px-6 max-w-5xl">
        
        <section class="card p-8 mb-20 shadow-2xl border border-indigo-500/20">
            <div class="flex flex-col items-center mb-8">
                <h2 class="text-3xl font-bold mb-2 uppercase tracking-widest">AIdent</h2>
                <div id="loader-box" class="flex items-center gap-2 text-[10px] font-bold text-indigo-400 uppercase">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                    <span id="status-text">Загрузка легкой модели ИИ...</span>
                </div>
            </div>

            <textarea id="userInput" rows="6" 
                class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-5 text-sm outline-none focus:border-indigo-500 transition-all mb-6 placeholder:text-slate-600"
                placeholder="Вставьте английский текст (минимум 30 символов) для анализа..."></textarea>

            <button id="runBtn" disabled class="glow-button w-full py-4 rounded-xl font-bold uppercase tracking-widest text-sm">
                Подготовка системы...
            </button>

            <div id="resultArea" class="hidden mt-10 space-y-6 pt-6 border-t border-slate-800">
                <div class="grid grid-cols-2 gap-6">
                    <div class="text-center p-6 bg-slate-900/80 rounded-3xl border border-red-500/10">
                        <p class="text-[10px] text-slate-500 mb-1 uppercase tracking-widest font-bold">AI probability</p>
                        <p id="aiVal" class="text-4xl font-bold text-red-500">0%</p>
                    </div>
                    <div class="text-center p-6 bg-slate-900/80 rounded-3xl border border-emerald-500/10">
                        <p class="text-[10px] text-slate-500 mb-1 uppercase tracking-widest font-bold">Human score</p>
                        <p id="humanVal" class="text-4xl font-bold text-emerald-500">0%</p>
                    </div>
                </div>
            </div>
        </section>

        <h3 class="text-xl font-bold mb-8 text-slate-400 uppercase tracking-[0.2em] border-l-2 border-indigo-500 pl-4 text-sm">OpenCV Projects</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
            <script>
                const projects = ["Шум и фильтры", "Детекция границ", "Детектор Canny", "Бинаризация", "Морфология", "Детекция объектов"];
                projects.forEach((name, i) => {
                    document.write(`
                        <div class="card overflow-hidden group border border-slate-800">
                            <video controls class="w-full h-48 object-cover bg-black opacity-80 group-hover:opacity-100 transition">
                                <source src="project${i+1}.mp4" type="video/mp4">
                            </video>
                            <div class="p-4 border-t border-slate-800">
                                <h4 class="font-bold text-indigo-300 text-[10px] tracking-widest uppercase">${name}</h4>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <footer class="border-t border-slate-900 py-16 text-center bg-slate-950/50">
        <div class="flex flex-col md:flex-row justify-center items-center gap-8 mb-8 text-sm text-slate-400">
            <span><i class="fas fa-phone text-indigo-500 mr-2"></i>+996 554 306 190</span>
            <span><i class="fas fa-envelope text-indigo-500 mr-2"></i>rysmendeevadalida01@gmail.com</span>
        </div>
        <p class="text-[10px] text-slate-600 uppercase tracking-[0.5em]">© 2026 год • Все права защищены</p>
    </footer>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const btn = document.getElementById('runBtn');
        const resArea = document.getElementById('resultArea');
        
        let detector;

        // Инициализация модели, которая ТОЧНО работает
        (async () => {
            try {
                statusText.innerText = "ЗАГРУЗКА В БРАУЗЕР (XENOVA)...";
                // Используем проверенную совместимую модель
                detector = await pipeline('text-classification', 'Xenova/roberta-base-openai-detector');
                
                statusText.innerText = "ГОТОВО К РАБОТЕ ✅";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                btn.disabled = false;
                btn.innerText = "ПРОВЕРИТЬ ТЕКСТ";
            } catch (err) {
                statusText.innerText = "ОШИБКА: НЕТ СВЯЗИ С МОДЕЛЬЮ";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                console.error(err);
            }
        })();

        btn.onclick = async () => {
            const val = document.getElementById('userInput').value.trim();
            if (val.length < 30) return alert("Введите хотя бы 30 символов английского текста");

            btn.disabled = true;
            btn.innerText = "АНАЛИЗИРУЮ...";
            resArea.classList.add('hidden');

            try {
                const out = await detector(val);
                // Модель Xenova выдает метки: "Real" и "Fake"
                const fakeObj = out[0].find(item => item.label === 'Fake' || item.label === 'LABEL_1');
                const realObj = out[0].find(item => item.label === 'Real' || item.label === 'LABEL_0');

                let ai = fakeObj ? fakeObj.score : 0;
                let human = realObj ? realObj.score : (1 - ai);

                document.getElementById('aiVal').innerText = (ai * 100).toFixed(1) + "%";
                document.getElementById('humanVal').innerText = (human * 100).toFixed(1) + "%";
                resArea.classList.remove('hidden');
                
            } catch (e) {
                alert("Ошибка анализа: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "ПРОВЕРИТЬ ТЕКСТ";
            }
        };
    </script>
</body>
</html>

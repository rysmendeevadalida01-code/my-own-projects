<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalida Portfolio | CV Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #0f172a; color: #f8fafc; }
        .card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(99, 102, 241, 0.1); border-radius: 24px; transition: 0.3s; }
        .card:hover { border-color: #6366f1; transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <header class="py-20 text-center">
        <h1 class="text-5xl md:text-6xl font-bold gradient-text tracking-tighter uppercase">Рысмендеева Далида</h1>
        <p class="text-indigo-300 mt-4 uppercase tracking-[0.4em] text-xs font-bold">Computer Vision Developer • 10 Класс • 24 ШГ</p>
    </header>

    <main class="container mx-auto px-6 max-w-6xl pb-20">
        
        <div class="flex items-center gap-4 mb-12">
            <h2 class="text-2xl font-bold uppercase tracking-widest">OpenCV Portfolio</h2>
            <div class="h-[1px] flex-grow bg-slate-800"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <script>
                const projects = [
                    {
                        name: "Шум и фильтры",
                        desc: "Алгоритмы размытия (Blur, Gaussian, Median) для удаления цифровых помех.",
                        goal: "Используется для предобработки фото перед распознаванием лиц или текста."
                    },
                    {
                        name: "Детекция границ",
                        desc: "Математические операторы Собеля и Лапласа для выделения перепадов яркости.",
                        goal: "Необходимо для анализа структуры объектов и их сегментации."
                    },
                    {
                        name: "Детектор Canny",
                        desc: "Многостадийный алгоритм для поиска тонких и четких контуров.",
                        goal: "Золотой стандарт в CV для выделения четких очертаний предметов."
                    },
                    {
                        name: "Бинаризация",
                        desc: "Преобразование изображения в строго черно-белый формат (Thresholding).",
                        goal: "Помогает отделить объект от фона для дальнейшего анализа формы."
                    },
                    {
                        name: "Морфология",
                        desc: "Операции расширения (Dilation) и сужения (Erosion) контуров.",
                        goal: "Убирает мелкие лишние точки («мусор») и закрывает дыры в масках объектов."
                    },
                    {
                        name: "Детекция объектов",
                        desc: "Поиск замкнутых контуров и отрисовка Bounding Box (рамок вокруг предметов).",
                        goal: "Основа для систем подсчета товаров на полках или машин в потоке."
                    }
                ];

                projects.forEach((p, i) => {
                    document.write(`
                        <div class="card overflow-hidden flex flex-col">
                            <div class="aspect-video bg-black relative">
                                <video controls class="w-full h-full object-cover opacity-90 transition">
                                    <source src="project${i+1}.mp4" type="video/mp4">
                                </video>
                            </div>
                            <div class="p-6 flex-grow flex flex-col">
                                <h4 class="font-bold text-indigo-300 text-lg mb-3 uppercase tracking-tight">${p.name}</h4>
                                <p class="text-slate-300 text-sm leading-relaxed mb-4">${p.desc}</p>
                                <div class="mt-auto pt-4 border-t border-slate-800/50">
                                    <p class="text-[11px] text-slate-500 italic"><span class="text-indigo-400 font-bold uppercase not-italic">Цель:</span> ${p.goal}</p>
                                </div>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <footer class="border-t border-slate-900 py-16 text-center bg-slate-950/50">
        <div class="flex flex-col md:flex-row justify-center items-center gap-12 mb-10 text-sm text-slate-400">
            <span class="hover:text-white transition cursor-default">
                <i class="fas fa-phone text-indigo-500 mr-2"></i>+996 554 306 190
            </span>
            <span class="hover:text-white transition cursor-default">
                <i class="fas fa-envelope text-indigo-500 mr-2"></i>rysmendeevadalida01@gmail.com
            </span>
        </div>
        <p class="text-[10px] text-slate-600 uppercase tracking-[0.6em] font-medium">© 2026 год • Все права защищены</p>
    </footer>

</body>
</html>

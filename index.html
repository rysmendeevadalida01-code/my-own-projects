<script type="module">

import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

env.allowLocalModels = false;

let classifier;

const btn = document.getElementById("checkBtn");
const result = document.getElementById("result");

async function loadModel(){

result.innerText="Загрузка нейросети..."

try{

classifier = await pipeline(
"sentiment-analysis",
"Xenova/distilbert-base-uncased-finetuned-sst-2-english"
);

result.innerText="Модель загружена. Вставьте текст."

}catch(e){

result.innerText="Ошибка загрузки модели"

console.error(e)

}

}

function estimateAI(text){

let lengthScore = Math.min(text.length / 600, 1)

let punctuation = (text.match(/[.,!?;]/g) || []).length
let punctuationScore = punctuation / text.length * 80

let sentences = text.split(".").length

let aiScore = (lengthScore*0.4 + punctuationScore*0.3 + sentences*0.3)

aiScore = Math.min(aiScore,0.95)

return aiScore

}

btn.onclick = async ()=>{

const text=document.getElementById("userInput").value.trim()

if(text.length<30){

alert("Введите более длинный текст")

return

}

result.innerText="Анализ..."

try{

await classifier(text)

const aiScore = estimateAI(text)
const humanScore = 1 - aiScore

result.innerHTML=`
🤖 ИИ: ${(aiScore*100).toFixed(1)}% <br>
👤 Человек: ${(humanScore*100).toFixed(1)}%
`

}catch(e){

result.innerText="Ошибка анализа"

console.error(e)

}

}

loadModel()

</script>

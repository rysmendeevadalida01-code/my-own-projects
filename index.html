<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalida Portfolio | AIdent AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #0f172a; color: #f8fafc; scroll-behavior: smooth; }
        .glow-card:hover { transform: translateY(-8px); box-shadow: 0 0 25px rgba(99, 102, 241, 0.4); transition: 0.3s; border-color: #6366f1; }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ai-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body>

    <header class="py-16 px-6 text-center border-b border-slate-800 bg-slate-900/50">
        <h1 class="text-5xl md:text-6xl font-bold mb-4 gradient-text tracking-tight">Рысмендеева Далида</h1>
        <p class="text-xl text-indigo-300 font-light tracking-widest uppercase mb-6">24 ШГ • 10 КЛАСС • CV & AI DEVELOPER</p>
        <div class="flex flex-col md:flex-row justify-center items-center gap-4 text-slate-400 text-sm">
            <span><i class="fas fa-envelope mr-2"></i>rysmendeevadalida01@gmail.com</span>
            <span><i class="fas fa-phone mr-2"></i>+996 554 306 190</span>
        </div>
    </header>

    <main class="container mx-auto px-6 py-16">
        
        <section class="max-w-3xl mx-auto mb-24 ai-panel rounded-3xl p-8 shadow-2xl border border-indigo-500/30">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold mb-2 gradient-text uppercase tracking-widest">AIdent Tool</h2>
                <p class="text-slate-400 text-sm">Локальный анализ текста (Transformers.js)</p>
                <div id="modelStatus" class="flex items-center justify-center gap-2 text-indigo-400 text-[10px] mt-4 uppercase tracking-widest font-bold">
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                    <span id="statusText">Инициализация модели...</span>
                </div>
            </div>

            <textarea id="aiInput" rows="6" 
                class="w-full bg-slate-900/80 border border-slate-700 rounded-2xl p-4 text-slate-200 focus:border-indigo-500 outline-none transition-all mb-4 placeholder:text-slate-600"
                placeholder="Вставьте английский текст для анализа..."></textarea>

            <button id="checkBtn" disabled 
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-500 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-bolt"></i>
                <span>Загрузка...</span>
            </button>

            <div id="aiResult" class="hidden mt-8 transition-all">
                </div>
        </section>

        <h2 class="text-2xl font-bold mb-10 text-slate-400 uppercase tracking-widest border-l-4 border-indigo-500 pl-4">Computer Vision Projects</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <script>
                const projects = [
                    "Шум и Фильтры", "Детекция границ", "Детектор Canny", 
                    "Бинаризация", "Морфология", "Детекция и подсчет"
                ];
                projects.forEach((title, i) => {
                    document.write(`
                        <div class="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden glow-card">
                            <video controls class="w-full h-48 object-cover bg-black">
                                <source src="project${i+1}.mp4" type="video/mp4">
                            </video>
                            <div class="p-6">
                                <h3 class="text-lg font-bold mb-2 text-indigo-300">${title}</h3>
                                <p class="text-sm text-slate-400 font-light">Проект выполнен в рамках курса Computer Vision.</p>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <footer class="text-center py-12 text-slate-600 text-xs border-t border-slate-900">
        <p>© 2026 • Рысмендеева Далида • Все данные защищены</p>
    </footer>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // Отключаем поиск локальных файлов, работаем только через CDN
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const btn = document.getElementById('checkBtn');
        const resultDiv = document.getElementById('aiResult');
        let classifier;

        // Загрузка модели (БЕЗ ТОКЕНА)
        (async () => {
            try {
                statusText.innerText = "Скачивание модели (около 100MB)...";
                classifier = await pipeline('text-classification', 'silentone0725/text-detector-model-v2');
                
                statusText.innerText = "Модель готова (на устройстве)";
                statusDot.classList.replace('bg-yellow-500', 'bg-emerald-500');
                statusDot.classList.remove('animate-pulse');
                btn.disabled = false;
                btn.querySelector('span').innerText = "Проверить текст";
            } catch (err) {
                statusText.innerText = "Ошибка загрузки модели";
                statusDot.classList.replace('bg-yellow-500', 'bg-red-500');
                console.error("Fetch Error:", err);
            }
        })();

        btn.addEventListener('click', async () => {
            const text = document.getElementById('aiInput').value.trim();
            if (text.length < 20) return alert("Введите более длинный текст.");

            btn.disabled = true;
            btn.querySelector('span').innerText = "Анализирую...";
            resultDiv.classList.add('hidden');

            try {
                // Выполнение прямо на устройстве
                const output = await classifier(text);
                const score = output[0].score;
                const label = output[0].label; 

                // Определяем ИИ (обычно LABEL_1 или Fake)
                let aiScore = (label.includes('1') || label.toLowerCase().includes('fake') || label.toLowerCase().includes('ai')) ? score : 1 - score;
                let humanScore = 1 - aiScore;

                resultDiv.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900/90 p-6 rounded-2xl border border-red-500/20 text-center">
                            <p class="text-[10px] text-slate-500 uppercase mb-1 font-bold">AI Probability</p>
                            <p class="text-4xl font-bold text-red-500">${(aiScore * 100).toFixed(1)}%</p>
                        </div>
                        <div class="bg-slate-900/90 p-6 rounded-2xl border border-emerald-500/20 text-center">
                            <p class="text-[10px] text-slate-500 uppercase mb-1 font-bold">Human Score</p>
                            <p class="text-4xl font-bold text-emerald-500">${(humanScore * 100).toFixed(1)}%</p>
                        </div>
                    </div>
                `;
                resultDiv.classList.remove('hidden');
            } catch (e) {
                alert("Ошибка анализа: " + e.message);
            } finally {
                btn.disabled = false;
                btn.querySelector('span').innerText = "Проверить текст";
            }
        });
    </script>
</body>
</html>

<script type="module">
    // Импортируем только необходимое
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    const btn = document.getElementById('runBtn');
    const resArea = document.getElementById('resultArea');
    const userInput = document.getElementById('userInput');
    
    let detector;

    // Инициализация модели
    (async () => {
        try {
            statusText.innerText = "ЗАГРУЗКА ВЕСОВ МОДЕЛИ (~120MB)...";
            
            // Pipeline автоматически скачивает модель с Hugging Face (без токена)
            // Мы используем 'text-classification', так как это задача детекции
            detector = await pipeline('text-classification', 'Xenova/roberta-base-openai-detector');
            
            statusText.innerText = "СИСТЕМА АКТИВНА ✅";
            statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
            btn.disabled = false;
        } catch (err) {
            statusText.innerText = "ОШИБКА ИНИЦИАЛИЗАЦИИ";
            statusDot.className = "w-2 h-2 rounded-full bg-red-500";
            console.error("Ошибка загрузки модели:", err);
        }
    })();

    btn.onclick = async () => {
        const text = userInput.value.trim();
        
        if (text.length < 30) {
            alert("Пожалуйста, введите более длинный текст для корректного анализа.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "КВАНТОВЫЙ АНАЛИЗ...";
        resArea.classList.add('hidden');

        try {
            // Запуск классификации
            const output = await detector(text);
            const result = output[0]; // {label: 'Fake', score: 0.99} или {label: 'Real', score: 0.99}

            let aiProbability, humanScore;

            // Логика зависит от меток конкретной модели
            // Для Xenova/roberta-base-openai-detector метки обычно 'Fake' (ИИ) и 'Real' (Человек)
            if (result.label === 'Fake' || result.label === 'LABEL_1') {
                aiProbability = result.score;
                humanScore = 1 - result.score;
            } else {
                humanScore = result.score;
                aiProbability = 1 - result.score;
            }

            // Обновление интерфейса
            document.getElementById('aiVal').innerText = (aiProbability * 100).toFixed(1) + "%";
            document.getElementById('humanVal').innerText = (humanScore * 100).toFixed(1) + "%";
            
            resArea.classList.remove('hidden');
            resArea.scrollIntoView({ behavior: 'smooth', block: 'center' });

        } catch (error) {
            console.error("Ошибка при анализе:", error);
            alert("Произошла ошибка при обработке текста.");
        } finally {
            btn.disabled = false;
            btn.innerText = "ПРОВЕРИТЬ ТЕКСТ";
        }
    };
</script>

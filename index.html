<script type="module">
  // Импорт из официального CDN (самая свежая стабильная версия на момент 2026)
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@latest';

  // Опционально: ускорение и кэш (можно убрать, если проблемы)
  env.allowLocalModels = true;
  env.useBrowserCache = true;

  let classifier = null;

  async function loadModel() {
    try {
      const loadingText = document.getElementById('loading-model');
      loadingText.innerText = 'Загружаю модель (один раз ~140 МБ, подожди 20–90 сек)...';

      classifier = await pipeline(
        'text-classification',
        'fakespot-ai/roberta-base-ai-text-detection-v1',
        { quantized: true }  // если хочешь легче/быстрее, но иногда хуже качество
      );

      loadingText.innerText = 'Модель загружена! ✅ Можно проверять текст.';
      document.getElementById('checkBtn').disabled = false;
    } catch (err) {
      console.error('Ошибка загрузки:', err);
      document.getElementById('loading-model').innerHTML = 
        `<span class="text-red-400">Не удалось загрузить модель: ${err.message}</span><br>` +
        `Попробуй: обновить страницу, открыть в Chrome/Edge, проверить интернет.`;
    }
  }

  // Запускаем загрузку сразу при открытии страницы
  loadModel();

  document.getElementById('checkBtn').addEventListener('click', async () => {
    const text = document.getElementById('userInput').value.trim();
    const resultDiv = document.getElementById('result');

    if (text.length < 30) {
      resultDiv.innerHTML = '<span class="text-red-400">Введите минимум 30 символов для нормальной проверки!</span>';
      return;
    }

    if (!classifier) {
      resultDiv.innerHTML = '<span class="text-yellow-400">Модель ещё загружается... Подожди 10–30 секунд.</span>';
      return;
    }

    resultDiv.innerHTML = 'Анализирую текст... ⏳';

    try {
      const output = await classifier(text, {
        truncation: true,
        max_length: 512
      });

      // output — массив, обычно один элемент
      const top = output[0];
      const label = top.label.toLowerCase();
      const score = top.score;

      let aiPercent = 0;
      let humanPercent = 0;

      if (label.includes('ai') || label.includes('fake') || label.includes('generated')) {
        aiPercent = (score * 100).toFixed(1);
        humanPercent = (100 - aiPercent).toFixed(1);
      } else {
        humanPercent = (score * 100).toFixed(1);
        aiPercent = (100 - humanPercent).toFixed(1);
      }

      resultDiv.innerHTML = `
        <div class="text-2xl font-bold mt-4">
          🤖 ИИ: <span class="text-red-400">${aiPercent}%</span><br>
          👤 Человек: <span class="text-green-400">${humanPercent}%</span>
        </div>
        <div class="text-sm text-slate-500 mt-3">
          (модель уверена на ${Math.round(Math.max(aiPercent, humanPercent))}%)
        </div>
      `;
    } catch (err) {
      console.error(err);
      resultDiv.innerHTML = `<span class="text-red-400">Ошибка анализа: ${err.message}</span>`;
    }
  });
</script>
